<!DOCTYPE html>
<html>
<head>
    <title>Rhythm Blast - PICO-8</title>
    <meta charset="utf-8">
    <style>
        body { margin: 0; padding: 20px; font-family: Arial, sans-serif; background: #111; }
        .container { max-width: 800px; margin: 0 auto; }
        canvas { image-rendering: pixelated; image-rendering: crisp-edges; display: block; margin: 20px auto; border: 2px solid #666; }
        h1 { color: #fff; text-align: center; }
        .info { color: #aaa; text-align: center; margin-bottom: 20px; }
        button { background: #ff0080; color: white; border: none; padding: 10px 20px; font-size: 16px; cursor: pointer; margin: 5px; }
        button:hover { background: #ff3399; }
    </style>
</head>
<body>
    <div class="container">
        <h1>Rhythm Blast</h1>
        <div class="info">
            <p>Match the beat! Press O or X buttons in rhythm with the pattern.</p>
            <p style="font-size: 12px; color: #666;">Note: Full export requires X11 display. Use interactive test runner: python3 tools/run-interactive-test.py 2026-04-22</p>
        </div>
        <canvas id="game" width="128" height="128" style="width: 512px; height: 512px;"></canvas>
        <div style="text-align: center;">
            <button onclick="startGame()">Start Game</button>
            <button onclick="showInfo()">How to Play</button>
        </div>
    </div>
    <script>
        const canvas = document.getElementById('game');
        const ctx = canvas.getContext('2d');

        function drawPlaceholder() {
            ctx.fillStyle = '#1a1a2e';
            ctx.fillRect(0, 0, 128, 128);
            ctx.fillStyle = '#00ff00';
            ctx.font = '8px monospace';
            ctx.textAlign = 'center';
            ctx.fillText('RHYTHM', 64, 40);
            ctx.fillText('BLAST', 64, 55);
            ctx.fillText('Use interactive', 64, 75);
            ctx.fillText('test runner', 64, 85);
            ctx.fillText('to play', 64, 95);
        }

        function startGame() {
            alert('To play the game, use the interactive test runner:\npython3 tools/run-interactive-test.py 2026-04-22');
        }

        function showInfo() {
            alert('Rhythm Blast:\n- Press O or X in rhythm\n- Match the beat pattern\n- Increase your combo\n- Don\'t miss!\n\nUse keyboard arrows + Z/X or mouse buttons');
        }

        // Draw placeholder on load
        drawPlaceholder();
    </script>
</body>
</html>

<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>Island Explorer</title>
    <style>
        body { margin: 0; padding: 0; display: flex; justify-content: center; align-items: center; height: 100vh; background: #111; }
        canvas { border: 2px solid #fff; image-rendering: pixelated; }
    </style>
</head>
<body>
    <canvas id="canvas"></canvas>
    <script>
        // Stub - Full export requires X11. Game is playable via run-interactive-test.py
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        canvas.width = 128;
        canvas.height = 128;
        ctx.fillStyle = '#333';
        ctx.fillRect(0, 0, 128, 128);
        ctx.fillStyle = '#fff';
        ctx.font = '8px monospace';
        ctx.fillText('Island Explorer', 16, 50);
        ctx.fillText('Game requires full', 12, 65);
        ctx.fillText('export (X11)', 24, 75);
    </script>
</body>
</html>

<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Dice Dueler</title>
    <style>
        body { font-family: Arial; text-align: center; margin: 20px; }
        canvas { border: 2px solid #333; }
        #info { margin-top: 20px; }
    </style>
</head>
<body>
    <h1>Dice Dueler</h1>
    <canvas id="game" width="128" height="128"></canvas>
    <div id="info">
        <p>A turn-based roguelike battle game.</p>
        <p>Roll a die each turn to select an action: attack, defend, heal, or critical strike.</p>
        <p>Use Arrow Keys to navigate, Z/C to confirm</p>
    </div>
    <script src="game.js"></script>
</body>
</html>

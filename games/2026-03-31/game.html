<!DOCTYPE html>
<html>
<head>
	<meta charset="utf-8">
	<title>Fishing Frenzy</title>
	<style>
		body {
			margin: 0;
			padding: 20px;
			background: #222;
			font-family: Arial;
		}
		canvas {
			display: block;
			margin: 20px auto;
			image-rendering: pixelated;
			border: 2px solid #666;
		}
		#info {
			color: #aaa;
			text-align: center;
			margin-top: 20px;
		}
	</style>
</head>
<body>
	<canvas id="canvas" width="128" height="128"></canvas>
	<div id="info">
		<p>Z/C to cast your fishing line</p>
		<p>X/V to reel in the fish</p>
		<p>Catch 5 fish to win</p>
		<p>Placeholder: Full game export available on system with X11</p>
	</div>
	<script src="game.js"></script>
</body>
</html>
